query CartValidationsGenerateRunInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
      }
    }
    lines {
      quantity
      sellingPlanAllocation {
        sellingPlan {
          id
          name
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            title
            hasAnyTag(tags: ["restricted-with-subscription"])
          }
        }
      }
    }
  }
}
